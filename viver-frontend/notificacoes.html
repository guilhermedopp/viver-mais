<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVER+ - Avisos</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
<div class="app">

  <header class="page-header">
    <div class="logo-mini">
      <img src="img/logo.png" alt="VIVER+">
      <span>VIVER+</span>
    </div>
    <h1 style="font-size:1.3rem;font-weight:800;color:var(--texto);flex:1;text-align:right;">Meus Avisos</h1>
  </header>

  <div class="page-content" id="container-notif">
    <div class="spinner">A carregar avisos...</div>
  </div>

  <nav class="nav" aria-label="Navegação principal">
    <a href="feed.html"         class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
    <a href="comunidades.html"  class="nav-item"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Grupos</span></a>
    <a href="publicar.html"     class="nav-item"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><span>Publicar</span></a>
    <a href="notificacoes.html" class="nav-item ativo"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><span>Avisos</span></a>
    <a href="perfil.html"       class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></a>
  </nav>
</div>

<script src="js/api.js"></script>
<script>
const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!usuario) window.location.href = 'index.html';

async function carregarNotificacoes() {
  try {
    await fetch(`${API_URL}/notificacoes/${usuario.id}/ler`, { method:'POST' });
    const r = await fetch(`${API_URL}/notificacoes/${usuario.id}`);
    const notifs = await r.json();
    const c = document.getElementById('container-notif');

    if (!notifs.length) {
      c.innerHTML = `<div class="empty-state" style="margin-top:40px;">
        <div class="icone">🔔</div>
        <p>Nenhum aviso por agora.</p>
        <p style="margin-top:8px;font-size:.9rem;">Quando alguém seguir você ou comentar, o aviso aparecerá aqui.</p>
      </div>`;
      return;
    }

    c.innerHTML = '';
    notifs.forEach(n => {
      const data = new Date(n.dataCriacao).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      const div = document.createElement('div');
      div.className = `notif-card${n.lida ? '' : ' nao-lida'}`;
      div.innerHTML = `
        <div class="notif-icone">🌱</div>
        <div style="flex:1;min-width:0;">
          <p class="notif-texto">${n.mensagem}</p>
          <p class="notif-data">${data}</p>
        </div>
        ${!n.lida ? '<span class="badge-novo">Novo</span>' : ''}`;
      c.appendChild(div);
    });
  } catch (_) {
    document.getElementById('container-notif').innerHTML = '<p style="color:var(--erro);padding:20px;text-align:center;">Erro ao carregar avisos.</p>';
  }
}

carregarNotificacoes();
</script>
<script src="js/pwa-setup.js"></script>
</body>
</html>
