<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVER+ - Avisos</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
<main class="tela-acesso" style="max-width:650px; padding-bottom:90px; justify-content:flex-start;">

  <header style="display:flex; align-items:center; gap:15px; margin-bottom:24px; padding-top:20px; border-bottom:2px solid var(--cor-borda); padding-bottom:15px;">
    <img src="img/logo.png" style="height:45px; object-fit:contain;">
    <h1 style="font-size:2rem; color:var(--cor-azul); margin:0;">Meus Avisos</h1>
  </header>

  <div id="container-notif">
    <p style="font-size:1.2rem; color:var(--cor-texto-suave);">A carregar avisos...</p>
  </div>

  <nav class="barra-navegacao">
    <a href="feed.html" class="item-nav">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span style="font-size:.9rem;">Início</span>
    </a>
    <a href="comunidades.html" class="item-nav">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span style="font-size:.9rem;">Grupos</span>
    </a>
    <a href="publicar.html" class="item-nav">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      <span style="font-size:.9rem;">Publicar</span>
    </a>
    <a href="notificacoes.html" class="item-nav ativo">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span style="font-size:.9rem;">Avisos</span>
    </a>
    <a href="perfil.html" class="item-nav">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span style="font-size:.9rem;">Perfil</span>
    </a>
  </nav>
</main>

<script>
const API_URL = 'http://localhost:8080/api';
const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!usuario) window.location.href = 'index.html';

async function carregarNotificacoes() {
  try {
    // Marca como lidas ao abrir a página
    await fetch(`${API_URL}/notificacoes/${usuario.id}/ler`, { method: 'POST' });

    const r = await fetch(`${API_URL}/notificacoes/${usuario.id}`);
    const notifs = await r.json();
    const container = document.getElementById('container-notif');

    if (notifs.length === 0) {
      container.innerHTML = `
        <div style="text-align:center; padding:40px 20px;">
          <div style="font-size:3rem; margin-bottom:15px;">🔔</div>
          <p style="font-size:1.3rem; color:var(--cor-texto-suave);">Nenhum aviso por agora.</p>
          <p style="font-size:1.1rem; color:var(--cor-texto-suave); margin-top:8px;">
            Quando alguém seguir você ou comentar no seu momento, o aviso aparecerá aqui.
          </p>
        </div>`;
      return;
    }

    container.innerHTML = '';
    notifs.forEach(n => {
      const data = new Date(n.dataCriacao).toLocaleDateString('pt-PT', {
        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
      });
      const card = document.createElement('div');
      card.style.cssText = `
        display:flex; gap:14px; align-items:flex-start; padding:16px;
        border-radius:14px; margin-bottom:10px;
        background:${n.lida ? '#fff' : '#eefaf0'};
        border:2px solid ${n.lida ? '#e9ecef' : 'var(--cor-primaria)'};
      `;
      card.innerHTML = `
        <div style="font-size:2rem; flex-shrink:0;">🌱</div>
        <div style="flex:1;">
          <p style="font-size:1.2rem; font-weight:600; color:#111; margin:0 0 4px;">${n.mensagem}</p>
          <span style="font-size:0.95rem; color:var(--cor-texto-suave);">${data}</span>
        </div>
        ${!n.lida ? '<span style="background:var(--cor-primaria);color:#fff;font-size:0.8rem;padding:2px 8px;border-radius:99px;align-self:center;">Novo</span>' : ''}
      `;
      container.appendChild(card);
    });
  } catch (err) {
    document.getElementById('container-notif').innerHTML = '<p style="color:red;">Erro ao carregar avisos.</p>';
  }
}

carregarNotificacoes();
</script>
</body>
</html>
