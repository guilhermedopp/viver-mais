<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVER+ - Avisos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body style="padding-bottom: 110px;">

<main class="tela-acesso" style="max-width: 650px; background: transparent; padding-top: 10px;">

    <header style="margin-bottom: 24px; text-align: center; padding-top: 10px;">
        <h1 style="font-size: 2.2rem; color: var(--cor-primaria-escura);">Meus Avisos</h1>
        <p style="color: var(--cor-texto-suave); font-weight: 600; font-size: 1.1rem; margin-top: 4px;">Acompanhe o carinho que recebe</p>
    </header>

    <section id="container-notif" style="width: 100%;">
        <div class="grupo-card" style="text-align: center;">
            <p style="font-size: 1.15rem; color: var(--cor-texto-suave); font-weight: bold;">A carregar os seus avisos...</p>
        </div>
    </section>

    <nav class="barra-navegacao" aria-label="Navegação Principal">
        <a href="feed.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
        <a href="comunidades.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Grupos</span></a>
        <a href="publicar.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><span>Publicar</span></a>
        <a href="notificacoes.html" class="item-nav ativo"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><span>Avisos</span></a>
        <a href="perfil.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></a>
    </nav>

</main>

<script src="js/api.js"></script>
<script src="js/pwa-setup.js"></script>

<script>
const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!usuario) window.location.href = 'index.html';

async function carregarNotificacoes() {
    try {
        // Marca como lidas ao abrir a página (A API trata do cabeçalho JWT automaticamente)
        await fetch(`${API_URL}/notificacoes/${usuario.id}/ler`, { method: 'POST' });

        const r = await fetch(`${API_URL}/notificacoes/${usuario.id}`);
        const notifs = await r.json();
        const container = document.getElementById('container-notif');

        // Estado Vazio (Sem Notificações)
        if (notifs.length === 0) {
            container.innerHTML = `
                <div class="grupo-card" style="text-align: center; padding: 40px 20px;">
                    <div style="font-size: 3.5rem; margin-bottom: 15px;">🔔</div>
                    <p style="font-size: 1.3rem; color: var(--cor-texto); font-weight: 800;">Nenhum aviso por agora.</p>
                    <p style="font-size: 1.05rem; color: var(--cor-texto-suave); margin-top: 12px; line-height: 1.5;">
                        Quando alguém começar a seguir ou reagir aos seus momentos, o aviso aparecerá aqui.
                    </p>
                </div>`;
            return;
        }

        container.innerHTML = '';
        notifs.forEach(n => {
            const data = new Date(n.dataCriacao).toLocaleDateString('pt-PT', {
                day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
            });
            
            // Define o aspeto consoante o estado de leitura
            const borderCor = !n.lida ? 'var(--cor-primaria-escura)' : 'transparent';
            const bgCor = !n.lida ? 'var(--cor-fundo)' : 'var(--cor-painel)';

            const card = document.createElement('article');
            card.className = 'grupo-card'; // Aproveitamos o nosso CSS poderoso
            card.style.cssText = `
                display: flex; gap: 16px; align-items: center; 
                padding: 16px 20px; margin-bottom: 14px;
                background: ${bgCor}; border: 2px solid ${borderCor};
            `;
            
            card.innerHTML = `
                <div style="font-size: 1.8rem; flex-shrink: 0; background: #fff; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--sombra-suave);">🌱</div>
                <div style="flex: 1;">
                    <p style="font-size: 1.15rem; font-weight: 700; color: var(--cor-texto); margin: 0 0 4px; line-height: 1.4;">${n.mensagem}</p>
                    <span style="font-size: 0.95rem; color: var(--cor-texto-suave); font-weight: 600;">${data}</span>
                </div>
                ${!n.lida ? '<span style="background: var(--cor-primaria-escura); color: #fff; font-size: 0.8rem; padding: 4px 10px; border-radius: 99px; font-weight: 800; align-self: center;">Novo</span>' : ''}
            `;
            container.appendChild(card);
        });
    } catch (err) {
        document.getElementById('container-notif').innerHTML = '<div class="grupo-card" style="text-align: center;"><p style="color: var(--cor-erro); font-weight: bold; font-size: 1.1rem;">Erro ao carregar avisos. Verifique a sua internet.</p></div>';
    }
}

carregarNotificacoes();
</script>
</body>
</html>
