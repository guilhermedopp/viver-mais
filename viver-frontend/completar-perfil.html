<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VIVER+ - Completar Perfil</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>

<div class="pagina-auth">

  <div class="auth-hero" style="padding:48px 28px 44px;">
    <img src="img/logo.png" alt="VIVER+"
         style="width:90px;height:90px;object-fit:contain;border-radius:50%;background:rgba(255,255,255,.18);padding:6px;">
    <h1 class="auth-titulo">VIVER+</h1>
    <p class="auth-subtitulo">Quase lá!</p>
  </div>

  <div class="auth-card">
    <h2>Falta pouco! 🌱</h2>
    <p style="color:var(--texto-suave);font-size:1rem;font-weight:600;margin-bottom:24px;">
      Para entrar no VIVER+ precisamos de mais dois dados.
    </p>

    <p id="msg-erro" style="display:none;background:#fee2e2;color:#991b1b;padding:12px 16px;border-radius:10px;font-weight:700;margin-bottom:16px;font-size:.95rem;"></p>

    <form id="form-completar">
      <div class="campo">
        <label for="nickname">Escolha o seu @apelido</label>
        <div class="input-icone">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
          <input type="text" id="nickname" placeholder="ex: dona_maria" autocomplete="off" autocapitalize="none">
        </div>
        <small id="status-nick"></small>
      </div>

      <div class="campo">
        <label for="dataNascimento">Data de Nascimento</label>
        <input type="date" id="dataNascimento">
        <small style="color:var(--texto-suave);">O VIVER+ é exclusivo para pessoas com 60 anos ou mais.</small>
      </div>

      <button type="submit" class="btn btn-primario" style="margin-top:12px;">ENTRAR NO VIVER+</button>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script>
const dadosPendentes = JSON.parse(sessionStorage.getItem('googlePendente') || 'null');
if (!dadosPendentes) window.location.href = 'index.html';

const inputNick = document.getElementById('nickname');
const statusNick = document.getElementById('status-nick');
let timerNick;
inputNick.addEventListener('input', () => {
  clearTimeout(timerNick);
  const nick = inputNick.value.replace('@', '').trim();
  if (nick.length < 3) { statusNick.textContent = ''; return; }
  timerNick = setTimeout(async () => {
    try {
      const r = await fetch(`${API_URL}/usuarios/nickname/${encodeURIComponent(nick)}/disponivel`);
      const data = await r.json();
      statusNick.textContent = data.disponivel ? '✅ Disponível!' : '❌ Já está em uso';
      statusNick.style.color = data.disponivel ? 'var(--verde-escuro)' : 'var(--erro)';
    } catch (_) {}
  }, 500);
});

document.getElementById('form-completar').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msgEl = document.getElementById('msg-erro');
  const nick = inputNick.value.replace('@', '').trim();
  const dataNasc = document.getElementById('dataNascimento').value;
  msgEl.style.display = 'none';
  if (!nick || !dataNasc) {
    msgEl.textContent = 'Por favor preencha todos os campos.';
    msgEl.style.display = 'block'; return;
  }
  try {
    const r = await fetch(`${API_URL}/auth/completar-perfil`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuarioId: dadosPendentes.usuario.id, nickname: nick, dataNascimento: dataNasc })
    });
    if (r.ok) {
      localStorage.setItem('usuarioLogado', JSON.stringify(await r.json()));
      sessionStorage.removeItem('googlePendente');
      window.location.href = 'feed.html';
    } else {
      msgEl.textContent = await r.text();
      msgEl.style.display = 'block';
    }
  } catch (_) {
    msgEl.textContent = 'Não foi possível ligar ao servidor.';
    msgEl.style.display = 'block';
  }
});
</script>
</body>
</html>
