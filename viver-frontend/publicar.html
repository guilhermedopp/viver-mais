<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVER+ - Partilhar Momento</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body style="padding-bottom: 110px;"> <main class="tela-acesso" style="max-width: 650px; background: transparent; padding-top: 10px;">

    <header style="margin-bottom: 24px; text-align: center; padding-top: 10px;">
        <h1 style="font-size: 2.2rem; color: var(--cor-primaria-escura);">Novo Momento</h1>
        <p style="color: var(--cor-texto-suave); font-weight: 600; font-size: 1.1rem; margin-top: 4px;">Partilhe o seu dia com quem mais gosta</p>
    </header>

    <section class="grupo-card">
        <form id="form-publicar">

            <div class="grupo-input">
                <label for="destino-post">Onde quer partilhar?</label>
                <select id="destino-post" class="campo-com-icone" style="cursor: pointer; font-weight: 700;">
                    <option value="0">🌎 No meu Feed (Público)</option>
                </select>
            </div>

            <div class="grupo-input">
                <label for="texto-post">O que gostaria de partilhar hoje?</label>
                <textarea id="texto-post" placeholder="Escreva aqui um pensamento, memória ou carinho..." required
                          class="campo-com-icone" style="min-height: 140px; resize: none;"></textarea>
            </div>

            <div class="grupo-input" style="margin-top: 24px;">
                <label>📷 Adicionar uma foto (opcional)</label>
                <input type="file" id="input-imagem" accept="image/*" style="display:none;">
                
                <button type="button" onclick="document.getElementById('input-imagem').click()" class="btn-secundario" style="border: 2px dashed var(--cor-primaria); background: var(--cor-fundo);">
                    + Toque para escolher uma foto
                </button>
                
                <div id="preview-imagem" style="display:none; margin-top: 16px; text-align: center; background: var(--cor-fundo); padding: 12px; border-radius: 16px;">
                    <img id="img-preview" style="max-width: 100%; max-height: 250px; border-radius: 12px; object-fit: cover; box-shadow: var(--sombra-suave);">
                    <button type="button" onclick="removerImagem()" style="display: inline-block; margin-top: 12px; background: none; border: none; color: var(--cor-erro); font-size: 1.1rem; font-weight: 800; cursor: pointer; padding: 8px;">
                        🗑️ Remover foto
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primario" id="btn-enviar" style="margin-top: 16px;">PUBLICAR MOMENTO</button>
        </form>
    </section>

    <nav class="barra-navegacao" aria-label="Navegação Principal">
        <a href="feed.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
        <a href="comunidades.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Grupos</span></a>
        <a href="publicar.html" class="item-nav ativo"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><span>Publicar</span></a>
        <a href="notificacoes.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><span>Avisos</span></a>
        <a href="perfil.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></a>
    </nav>

</main>

<script src="js/api.js"></script>
<script src="js/pwa-setup.js"></script>

<script>
const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!usuarioLogado) window.location.href = 'index.html';

let imagemBase64 = null;

// Preview da imagem escolhida
document.getElementById('input-imagem').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        imagemBase64 = ev.target.result;
        document.getElementById('img-preview').src = imagemBase64;
        document.getElementById('preview-imagem').style.display = 'block';
    };
    reader.readAsDataURL(file);
});

function removerImagem() {
    imagemBase64 = null;
    document.getElementById('preview-imagem').style.display = 'none';
    document.getElementById('input-imagem').value = '';
}

// Carrega grupos do usuário no select
async function carregarGrupos() {
    try {
        const r = await fetch(`${API_URL}/comunidades?usuarioId=${usuarioLogado.id}`);
        if (r.ok) {
            const grupos = await r.json();
            const select = document.getElementById('destino-post');
            grupos.forEach(g => {
                const op = document.createElement('option');
                op.value = g.id;
                op.textContent = `👥 Grupo: ${g.nome}`;
                select.appendChild(op);
            });
        }
    } catch (e) { console.error("Erro ao carregar grupos:", e); }
}

// Enviar formulário
document.getElementById('form-publicar').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-enviar');
    const texto = document.getElementById('texto-post').value.trim();
    const destinoSelecionado = document.getElementById('destino-post').value;

    let destinoTipo = 'USUARIO';
    let destinoId = usuarioLogado.id;
    if (destinoSelecionado !== '0') {
        destinoTipo = 'COMUNIDADE';
        destinoId = parseInt(destinoSelecionado);
    }

    btn.textContent = 'A PUBLICAR...';
    btn.disabled = true;
    btn.style.opacity = '0.7';

    try {
        const r = await fetch(`${API_URL}/posts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ texto, imagem: imagemBase64, autor: usuarioLogado, destinoTipo, destinoId })
        });
        if (r.ok) {
            window.location.href = 'feed.html';
        } else {
            alert(await r.text());
            btn.textContent = 'PUBLICAR MOMENTO';
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    } catch (_) {
        alert('Não foi possível publicar. Verifique a sua ligação.');
        btn.textContent = 'PUBLICAR MOMENTO';
        btn.disabled = false;
        btn.style.opacity = '1';
    }
});

// Inicia as chamadas
carregarGrupos();
</script>
