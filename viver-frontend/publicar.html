<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVER+ - Partilhar Momento</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
<div class="app">

  <header class="page-header">
    <div class="logo-mini"><img src="img/logo.png" alt="VIVER+"><span>VIVER+</span></div>
    <h1 style="font-size:1.3rem;font-weight:800;flex:1;text-align:right;">Novo Momento</h1>
  </header>

  <div class="page-content">
    <form id="form-publicar">

      <div class="campo">
        <label for="destino-post">Onde quer partilhar?</label>
        <select id="destino-post">
          <option value="0">🌎 No meu Feed (Público)</option>
        </select>
      </div>

      <div class="campo">
        <label for="texto-post">O que gostaria de partilhar hoje?</label>
        <textarea id="texto-post" maxlength="500" placeholder="Escreva aqui o seu pensamento, memória ou carinho..." required
          style="min-height:160px;padding:16px;border:1.5px solid var(--borda);border-radius:20px;font-family:inherit;font-weight:600;resize:none;background:var(--verde-fundo);color:var(--texto);"></textarea>
        <small id="contador-chars" style="text-align:right;display:block;">0 / 500</small>
      </div>

      <div class="campo">
        <label>📷 Adicionar uma foto (opcional)</label>
        <input type="file" id="input-imagem" accept="image/*" style="display:none;">
        <button type="button" onclick="document.getElementById('input-imagem').click()"
          class="btn btn-secundario" style="border:1.5px dashed var(--verde-pastel);width:100%;">
          Toque para escolher uma foto
        </button>
        <div class="foto-preview" id="preview-imagem" style="display:none;">
          <img id="img-preview" alt="Pré-visualização">
          <button type="button" class="remover" onclick="removerImagem()">✕</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primario" id="btn-enviar" style="margin-top:8px;">PUBLICAR</button>
    </form>
  </div>

  <nav class="nav" aria-label="Navegação principal">
    <a href="feed.html"         class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
    <a href="chat.html"         class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><span>Chat</span></a>
    <a href="publicar.html"     class="nav-pub ativo" aria-label="Publicar momento"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></a>
    <a href="notificacoes.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><span>Avisos</span></a>
    <a href="perfil.html"       class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></a>
  </nav>
</div>

<script src="js/api.js"></script>
<script>
const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!usuarioLogado) window.location.href = 'index.html';

let imagemBase64 = null;

document.getElementById('texto-post').addEventListener('input', function() {
  const n = this.value.length;
  const el = document.getElementById('contador-chars');
  el.textContent = `${n} / 500`;
  el.style.color = n > 450 ? 'var(--erro)' : 'var(--texto-suave)';
});

document.getElementById('input-imagem').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    imagemBase64 = ev.target.result;
    document.getElementById('img-preview').src = imagemBase64;
    document.getElementById('preview-imagem').style.display = 'block';
  };
  reader.readAsDataURL(file);
});

function removerImagem() {
  imagemBase64 = null;
  document.getElementById('preview-imagem').style.display = 'none';
  document.getElementById('input-imagem').value = '';
}

async function carregarGrupos() {
  try {
    const r = await fetch(`${API_URL}/comunidades?usuarioId=${usuarioLogado.id}`);
    if (r.ok) {
      const grupos = await r.json();
      const select = document.getElementById('destino-post');
      grupos.forEach(g => {
        const op = document.createElement('option');
        op.value = g.id;
        op.textContent = `👥 Grupo: ${g.nome}`;
        select.appendChild(op);
      });
    }
  } catch (e) {}
}

document.getElementById('form-publicar').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-enviar');
  const texto = document.getElementById('texto-post').value.trim();
  const destinoSelecionado = document.getElementById('destino-post').value;
  let destinoTipo = 'USUARIO', destinoId = usuarioLogado.id;
  if (destinoSelecionado !== '0') { destinoTipo = 'COMUNIDADE'; destinoId = parseInt(destinoSelecionado); }

  btn.textContent = 'A PUBLICAR...';
  btn.disabled = true;
  try {
    const r = await fetch(`${API_URL}/posts`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        texto, imagem: imagemBase64,
        autor: { id: usuarioLogado.id, nome: usuarioLogado.nome },
        destinoTipo, destinoId
      })
    });
    if (r.ok) window.location.href = 'feed.html';
    else { mostrarToast(await r.text(), 'erro'); btn.textContent = 'PUBLICAR'; btn.disabled = false; }
  } catch (_) {
    mostrarToast('Não foi possível publicar. Verifique a ligação.', 'erro');
    btn.textContent = 'PUBLICAR'; btn.disabled = false;
  }
});

carregarGrupos();
</script>
<script src="js/pwa-setup.js"></script>
</body>
</html>
