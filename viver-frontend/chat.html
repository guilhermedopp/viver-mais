<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVER+ - Mensagens</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
<div class="app">

    <!-- Lista de contactos -->
    <div id="tela-lista">
        <header class="page-header">
            <div class="logo-mini">
                <img src="img/logo.png" alt="VIVER+">
                <span>VIVER+</span>
            </div>
            <h1 style="font-size:1.3rem;font-weight:800;flex:1;text-align:right;">Mensagens</h1>
        </header>

        <div class="filtros">
            <button class="filtro ativo" id="btn-amigos" onclick="mudarAba('amigos')" style="flex:1;">Amigos</button>
            <button class="filtro"       id="btn-grupos" onclick="mudarAba('grupos')" style="flex:1;">Grupos</button>
        </div>

        <div class="page-content" id="lista-conteudo">
            <div class="spinner">A carregar conversas...</div>
        </div>
    </div>

    <!-- Conversa (overlay full-screen) -->
    <div id="tela-conversa" class="chat-overlay">
        <div class="chat-header">
            <button onclick="fecharConversa()" class="btn-icone" aria-label="Voltar">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <div id="conversa-avatar"></div>
            <h2 id="conversa-nome" style="font-size:1.15rem;font-weight:800;color:var(--texto);flex:1;margin:0;">–</h2>
        </div>

        <div id="area-mensagens" class="chat-msgs"></div>

        <div class="chat-input-bar">
            <input type="text" id="input-msg" class="chat-input" placeholder="A sua mensagem...">
            <button onclick="enviarMensagem()" class="btn-enviar" aria-label="Enviar">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <nav class="nav" id="nav-bar" aria-label="Navegação principal">
        <a href="feed.html"         class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
        <a href="comunidades.html"  class="nav-item"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Grupos</span></a>
        <a href="publicar.html"     class="nav-pub" aria-label="Publicar momento"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></a>
        <a href="notificacoes.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><span>Avisos</span></a>
        <a href="perfil.html"       class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></a>
    </nav>
</div>

<script src="js/api.js"></script>
<script src="js/pwa-setup.js"></script>
<script>
const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!usuario) window.location.href = 'index.html';

let abaAtual = 'amigos';
let chatAtivo = { tipo: null, id: null, nome: null };
let loopMensagens = null;

const urlParams = new URLSearchParams(window.location.search);
const grupoIdAbertura = urlParams.get('grupo');

function mudarAba(aba) {
    abaAtual = aba;
    document.getElementById('btn-amigos').classList.toggle('ativo', aba === 'amigos');
    document.getElementById('btn-grupos').classList.toggle('ativo', aba === 'grupos');
    carregarLista();
}

async function carregarLista() {
    const container = document.getElementById('lista-conteudo');
    container.innerHTML = '<div class="spinner">A carregar...</div>';

    try {
        if (abaAtual === 'amigos') {
            const r = await fetch(`${API_URL}/usuarios`);
            const usuarios = await r.json();
            const contatos = usuarios.filter(u => u.id !== usuario.id);

            if (contatos.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icone">👥</div><p>Sem contactos ainda. Vá à página de Grupos para conhecer pessoas!</p></div>';
                return;
            }

            container.innerHTML = contatos.map(c => `
                <div class="chat-contato" onclick="abrirConversa('PRIVADO', ${c.id}, '${c.nome.replace(/'/g, "\\'")}')">
                    ${c.fotoPerfil
                        ? `<img src="${c.fotoPerfil}" class="avatar avatar-md" alt="${c.nome}">`
                        : `<div class="avatar avatar-md">${c.nome.charAt(0).toUpperCase()}</div>`}
                    <div>
                        <p class="chat-contato-nome">${c.nome}</p>
                        <p class="chat-contato-sub">Tocar para conversar</p>
                    </div>
                </div>`).join('');
        } else {
            const r = await fetch(`${API_URL}/comunidades?usuarioId=${usuario.id}`);
            const grupos = await r.json();

            if (grupos.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icone">💬</div><p>Não pertence a nenhum grupo. Vá à aba Grupos!</p></div>';
                return;
            }

            container.innerHTML = grupos.map(g => `
                <div class="chat-contato" onclick="abrirConversa('GRUPO', ${g.id}, '${g.nome.replace(/'/g, "\\'")}')">
                    <div class="avatar avatar-md" style="background:var(--verde-claro);color:var(--verde-escuro);font-size:1.3rem;">👥</div>
                    <div>
                        <p class="chat-contato-nome">${g.nome}</p>
                        <p class="chat-contato-sub">Chat de grupo</p>
                    </div>
                </div>`).join('');

            if (grupoIdAbertura && chatAtivo.id === null) {
                const grp = grupos.find(x => x.id == grupoIdAbertura);
                if (grp) abrirConversa('GRUPO', grp.id, grp.nome);
            }
        }
    } catch (e) {
        container.innerHTML = '<p style="color:var(--erro);text-align:center;padding:24px;font-weight:700;">Erro de ligação.</p>';
    }
}

function abrirConversa(tipo, id, nome) {
    chatAtivo = { tipo, id, nome };
    document.getElementById('tela-lista').style.display = 'none';
    document.getElementById('nav-bar').style.display = 'none';
    document.getElementById('tela-conversa').style.display = 'flex';

    document.getElementById('conversa-nome').textContent = nome;
    document.getElementById('conversa-avatar').innerHTML = tipo === 'GRUPO'
        ? `<div class="avatar avatar-md" style="background:var(--verde-claro);color:var(--verde-escuro);font-size:1.3rem;">👥</div>`
        : `<div class="avatar avatar-md">${nome.charAt(0).toUpperCase()}</div>`;

    document.getElementById('area-mensagens').innerHTML = '<div class="spinner">A sincronizar...</div>';

    carregarMensagens();
    loopMensagens = setInterval(carregarMensagens, 3000);
}

function fecharConversa() {
    clearInterval(loopMensagens);
    chatAtivo = { tipo: null, id: null, nome: null };

    if (grupoIdAbertura) {
        const url = new URL(window.location);
        url.searchParams.delete('grupo');
        window.history.replaceState({}, '', url);
    }

    document.getElementById('tela-conversa').style.display = 'none';
    document.getElementById('nav-bar').style.display = 'flex';
    document.getElementById('tela-lista').style.display = 'block';
    carregarLista();
}

async function carregarMensagens() {
    try {
        const url = chatAtivo.tipo === 'PRIVADO'
            ? `${API_URL}/chat/${usuario.id}/${chatAtivo.id}`
            : `${API_URL}/comunidades/${chatAtivo.id}/mensagens?usuarioId=${usuario.id}`;

        const r = await fetch(url);
        if (!r.ok) return;
        const mensagens = await r.json();
        const area = document.getElementById('area-mensagens');

        if (mensagens.length === 0) {
            if (area.innerHTML.includes('spinner') || area.innerHTML.includes('sincronizar')) {
                area.innerHTML = '<div class="empty-state" style="margin-top:32px;"><div class="icone">💬</div><p>Seja o primeiro a enviar uma mensagem!</p></div>';
            }
            return;
        }

        let html = '';
        mensagens.forEach(m => {
            const souEu = m.remetenteId === usuario.id || (m.autor && m.autor.id === usuario.id) || m.usuario_id === usuario.id;
            const nomeGrupo = (!souEu && chatAtivo.tipo === 'GRUPO')
                ? `<p class="balao-autor">${m.autor ? m.autor.nome : 'Membro'}</p>`
                : '';
            html += `<div class="balao ${souEu ? 'balao-meu' : 'balao-outro'}">${nomeGrupo}${m.conteudo}</div>`;
        });

        if (area.innerHTML !== html) {
            area.innerHTML = html;
            area.scrollTop = area.scrollHeight;
        }
    } catch (e) {}
}

async function enviarMensagem() {
    const input = document.getElementById('input-msg');
    const texto = input.value.trim();
    if (!texto) return;

    const area = document.getElementById('area-mensagens');
    area.innerHTML += `<div class="balao balao-meu" style="opacity:.6;">${texto}</div>`;
    area.scrollTop = area.scrollHeight;
    input.value = '';

    try {
        let url, bodyData;
        if (chatAtivo.tipo === 'PRIVADO') {
            url = `${API_URL}/chat`;
            bodyData = { remetenteId: usuario.id, destinatarioId: chatAtivo.id, conteudo: texto };
        } else {
            url = `${API_URL}/comunidades/${chatAtivo.id}/mensagens`;
            bodyData = { usuarioId: usuario.id, conteudo: texto };
        }
        await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData) });
        carregarMensagens();
    } catch (e) { alert('Falha ao enviar mensagem.'); }
}

document.getElementById('input-msg').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') enviarMensagem();
});

if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        const area = document.getElementById('area-mensagens');
        if (area && chatAtivo.id) setTimeout(() => { area.scrollTop = area.scrollHeight; }, 100);
    });
}

if (grupoIdAbertura) {
    mudarAba('grupos');
} else {
    carregarLista();
}
</script>
</body>
</html>
