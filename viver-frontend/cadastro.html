<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VIVER+ - Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="tela-acesso">
        <header class="marca">
            <h1>VIVER+</h1>
            <p>Junte-se à nossa comunidade!</p>
        </header>

        <section class="area-formulario">
            <form id="form-cadastro">
                <div class="grupo-input">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="grupo-input">
                    <label>Escolha seu @nickname</label>
                    <input type="text" id="nickname" placeholder="ex: maria_silva" required>
                    <small id="status-nick" style="color: var(--cor-azul);"></small>
                </div>

                <div class="grupo-input">
                    <label>E-mail</label>
                    <input type="email" id="email" required>
                </div>

                <div class="grupo-input">
                    <label>Data de Nascimento</label>
                    <input type="date" id="dataNascimento" required>
                </div>

                <div class="grupo-input">
                    <label>Senha</label>
                    <input type="password" id="senha" required>
                </div>

                <button type="submit" class="btn-primario btn-grande">CRIAR CONTA</button>
            </form>
            <div class="area-links">
                <p>Já tem conta?</p> <a href="index.html">Entrar</a>
            </div>
        </section>
    </main>

    <script>
        const inputNick = document.getElementById('nickname');
        const statusNick = document.getElementById('status-nick');

        // Validação em tempo real (debounce)
        let timer;
        inputNick.addEventListener('input', () => {
            clearTimeout(timer);
            const nick = inputNick.value.replace('@', '');
            if (nick.length < 3) {
                statusNick.innerText = "Mínimo 3 caracteres";
                return;
            }
            
            timer = setTimeout(async () => {
                const res = await fetch(`http://localhost:8080/api/usuarios/nickname/${nick}/disponivel`);
                const data = await res.json();
                statusNick.innerText = data.disponivel ? "✅ Disponível" : "❌ Já em uso";
                statusNick.style.color = data.disponivel ? "green" : "red";
            }, 500);
        });

        document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                nome: document.getElementById('nome').value,
                nickname: document.getElementById('nickname').value.replace('@', ''),
                email: document.getElementById('email').value,
                dataNascimento: document.getElementById('dataNascimento').value,
                senha: document.getElementById('senha').value
            };

            const res = await fetch('http://localhost:8080/api/cadastro', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                localStorage.setItem('emailRecenteCadastro', payload.email);
                alert('Conta criada com sucesso!');
                window.location.href = 'index.html';
            } else {
                alert('Erro: ' + await res.text());
            }
        });
    </script>
</body>
</html>
