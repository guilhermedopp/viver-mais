<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVER+ - Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body style="padding-bottom: 0;">
    <main class="tela-acesso" style="margin: 0 auto; justify-content: flex-start; padding-top: 5vh; min-height: 100vh;">
        <header class="marca" style="margin-bottom: 20px;">
            <img src="img/logo.png" alt="Logótipo Oficial do VIVER+">
            <h1>VIVER+</h1>
            <p>Junte-se à nossa comunidade!</p>
        </header>

        <section class="area-formulario grupo-card">
            <h2 style="text-align: center; margin-bottom: 24px; color: var(--cor-primaria-escura);">CRIAR CONTA</h2>

            <form id="form-cadastro">
                <div class="grupo-input">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="O seu nome" required>
                </div>

                <div class="grupo-input">
                    <label for="nickname">Escolha o seu @nickname</label>
                    <input type="text" id="nickname" placeholder="ex: maria_silva" required>
                    <small id="status-nick" style="font-size: 1rem; font-weight: 800; display: block; margin-top: 8px;"></small>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                    <small id="status-email" style="font-size: 1rem; font-weight: 800; display: block; margin-top: 8px; line-height: 1.4;"></small>
                </div>

                <div class="grupo-input">
                    <label for="dataNascimento">Data de Nascimento</label>
                    <input type="date" id="dataNascimento" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Mínimo de 8 caracteres" required>
                </div>

                <div class="grupo-input">
                    <label for="confirmaSenha">Confirmar Senha</label>
                    <input type="password" id="confirmaSenha" placeholder="Repita a senha" required>
                    
                    <label style="display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 1.15rem; font-weight: 700; cursor: pointer; color: var(--cor-texto-suave);">
                        <input type="checkbox" onclick="toggleSenha()" style="width: 24px; height: 24px; cursor: pointer; accent-color: var(--cor-primaria-escura);"> 
                        Mostrar senhas
                    </label>
                </div>

                <button type="submit" class="btn-primario" id="btn-submit" style="margin-top: 10px;">CRIAR A MINHA CONTA</button>
            </form>
            
            <div style="text-align: center; font-size: 1.15rem; font-weight: 700; margin-top: 24px;">
                <span style="color: var(--cor-texto-suave);">Já tem conta?</span> 
                <a href="index.html" style="color: var(--cor-azul); text-decoration: none;">Entrar aqui</a>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/pwa-setup.js"></script> 
    <script>
        function toggleSenha() {
            const senha = document.getElementById('senha');
            const confirma = document.getElementById('confirmaSenha');
            const type = senha.type === 'password' ? 'text' : 'password';
            senha.type = type;
            confirma.type = type;
        }

        // Validação de nickname (AGORA USA API_URL)
        const inputNick = document.getElementById('nickname');
        const statusNick = document.getElementById('status-nick');
        let timerNick;
        inputNick.addEventListener('input', () => {
            clearTimeout(timerNick);
            const nick = inputNick.value.replace('@', '');
            if (nick.length < 3) { statusNick.innerText = ""; return; }
            timerNick = setTimeout(async () => {
                try {
                    const res = await fetch(`${API_URL}/usuarios/nickname/${nick}/disponivel`);
                    const data = await res.json();
                    statusNick.innerText = data.disponivel ? "✅ Disponível" : "❌ Já em uso";
                    statusNick.style.color = data.disponivel ? "var(--cor-sucesso)" : "var(--cor-erro)";
                } catch(e) { console.error(e); }
            }, 500);
        });

        // Validação de E-mail
        const inputEmail = document.getElementById('email');
        const statusEmail = document.getElementById('status-email');
        const btnSubmit = document.getElementById('btn-submit');
        let timerEmail;

        inputEmail.addEventListener('input', () => {
            clearTimeout(timerEmail);
            const email = inputEmail.value.trim();
            
            if (!email.includes('@') || !email.includes('.')) { 
                statusEmail.innerText = ""; 
                btnSubmit.disabled = false;
                btnSubmit.style.opacity = "1";
                return; 
            }

            statusEmail.innerText = "A verificar e-mail na internet...";
            statusEmail.style.color = "var(--cor-texto-suave)";
            btnSubmit.disabled = true;
            btnSubmit.style.opacity = "0.5";

            timerEmail = setTimeout(async () => {
                try {
                    // 1. Verifica na nossa Base de Dados (AGORA USA API_URL)
                    const resDB = await fetch(`${API_URL}/usuarios/buscar?email=${encodeURIComponent(email)}`);
                    if (resDB.ok) {
                        statusEmail.innerText = "❌ Este e-mail já tem conta no VIVER+";
                        statusEmail.style.color = "var(--cor-erro)";
                        return;
                    }

                    // 2. Verifica no MUNDO REAL (API Externa)
                    const API_KEY = "26522ba265584d59b8fe1046455f8fc2"; 
                    const urlMundo = `https://emailvalidation.abstractapi.com/v1/?api_key=${API_KEY}&email=${encodeURIComponent(email)}`;
                    
                    const resMundo = await fetch(urlMundo);
                    const dataMundo = await resMundo.json();
                    
                    if (dataMundo.deliverability === "DELIVERABLE") {
                        statusEmail.innerText = "✅ E-mail válido e verdadeiro!";
                        statusEmail.style.color = "var(--cor-sucesso)";
                        btnSubmit.disabled = false;
                        btnSubmit.style.opacity = "1";
                    } else if (dataMundo.deliverability === "UNDELIVERABLE") {
                        statusEmail.innerText = "❌ Este e-mail não existe no mundo real.";
                        statusEmail.style.color = "var(--cor-erro)"; 
                    } else {
                        statusEmail.innerText = "⚠️ E-mail com formato válido, mas não foi possível garantir se existe.";
                        statusEmail.style.color = "#F57C00";
                        btnSubmit.disabled = false;
                        btnSubmit.style.opacity = "1";
                    }
                } catch (e) {
                    statusEmail.innerText = "";
                    btnSubmit.disabled = false;
                    btnSubmit.style.opacity = "1";
                }
            }, 1200);
        });

        // Envio do formulário (AGORA USA API_URL)
        document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirmaSenha').value;

            if (senha !== confirma) {
                alert('As senhas não coincidem!');
                return;
            }

            const payload = {
                nome: document.getElementById('nome').value,
                nickname: document.getElementById('nickname').value.replace('@', ''),
                email: document.getElementById('email').value,
                dataNascimento: document.getElementById('dataNascimento').value,
                senha: senha
            };

            btnSubmit.disabled = true;
            btnSubmit.textContent = "A CRIAR CONTA...";

            try {
                const res = await fetch(`${API_URL}/cadastro`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    localStorage.setItem('emailRecenteCadastro', payload.email);
                    alert('Conta criada com sucesso!');
                    window.location.href = 'index.html';
                } else {
                    alert('Erro: ' + await res.text());
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = "CRIAR A MINHA CONTA";
                }
            } catch(e) {
                alert('Erro de ligação. O servidor está desligado ou o IP mudou.');
                btnSubmit.disabled = false;
                btnSubmit.textContent = "CRIAR A MINHA CONTA";
            }
        });
    </script>
</body>
</html>
