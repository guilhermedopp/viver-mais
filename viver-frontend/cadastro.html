<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VIVER+ - Criar Conta</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>

<div class="pagina-auth">

  <div class="auth-hero" style="padding: 40px 28px 44px;">
    <img src="img/logo.png" alt="VIVER+"
         style="width:90px;height:90px;object-fit:contain;border-radius:50%;background:rgba(255,255,255,.18);padding:6px;margin-bottom:4px;">
    <h1 class="auth-titulo">VIVER+</h1>
    <p class="auth-subtitulo">Junte-se à nossa comunidade!</p>
  </div>

  <div class="auth-card">
    <h2>Criar Conta</h2>

    <p id="msg-cadastro" style="display:none;background:#fee2e2;color:#991b1b;padding:12px 14px;border-radius:10px;font-weight:700;font-size:.95rem;margin-bottom:16px;"></p>

    <form id="form-cadastro">

      <div class="campo">
        <label for="nome">Nome Completo</label>
        <div class="input-icone">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <input type="text" id="nome" placeholder="Ex: Maria dos Santos" autocomplete="name" required>
        </div>
      </div>

      <div class="campo">
        <label for="nickname">Escolha o seu @apelido</label>
        <div class="input-icone">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
          <input type="text" id="nickname" placeholder="Ex: maria_silva" autocapitalize="none" autocomplete="off" required>
        </div>
        <small id="status-nick"></small>
      </div>

      <div class="campo">
        <label for="email">E-mail</label>
        <div class="input-icone">
          <svg viewBox="0 0 24 24"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-11Zm3.1-.5 5.9 5.1L17.9 6H6.1Zm12.9 2.1-6.3 5.4a1.1 1.1 0 0 1-1.4 0L5 8.1v9.4c0 .3.2.5.5.5h13c.3 0 .5-.2.5-.5V8.1Z"/></svg>
          <input type="email" id="email" placeholder="Ex: maria.santos@email.com" autocomplete="email" required>
        </div>
        <small id="status-email"></small>
      </div>

      <div class="campo">
        <label for="dataNascimento">Data de Nascimento</label>
        <input type="date" id="dataNascimento" required>
        <small style="color:var(--texto-suave);">O VIVER+ é exclusivo para pessoas com 60 anos ou mais.</small>
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <div class="input-icone">
          <svg viewBox="0 0 24 24"><path d="M17 9h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 10 0v2Zm-8 0h6V7a3 3 0 0 0-6 0v2Zm3 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
          <input type="password" id="senha" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
        </div>
        <small style="color:var(--texto-suave);">Deve conter letras e números.</small>
      </div>

      <div class="campo">
        <label for="confirmaSenha">Confirmar Senha</label>
        <div class="input-icone">
          <svg viewBox="0 0 24 24"><path d="M17 9h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 10 0v2Zm-8 0h6V7a3 3 0 0 0-6 0v2Zm3 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
          <input type="password" id="confirmaSenha" placeholder="Repita a senha" autocomplete="new-password" required>
        </div>
        <label style="display:flex;align-items:center;gap:10px;margin-top:12px;font-size:1rem;font-weight:700;cursor:pointer;color:var(--texto-suave);">
          <input type="checkbox" onclick="toggleSenha()" style="width:22px;height:22px;cursor:pointer;accent-color:var(--verde);"> Mostrar senhas
        </label>
      </div>

      <button type="submit" id="btn-submit" class="btn btn-primario" style="margin-top:8px;">
        CRIAR A MINHA CONTA
      </button>

    </form>

    <div class="link-pagina">
      Já tem conta? <a href="index.html">Entrar</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  const API_URL = 'http://localhost:8080/api';

  function toggleSenha() {
    ['senha','confirmaSenha'].forEach(id => {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    });
  }

  // Validação de @nickname em tempo real
  const inputNick = document.getElementById('nickname');
  const statusNick = document.getElementById('status-nick');
  let timerNick;
  inputNick.addEventListener('input', () => {
    clearTimeout(timerNick);
    const nick = inputNick.value.replace('@', '').trim();
    if (nick.length < 3) { statusNick.textContent = ''; return; }
    timerNick = setTimeout(async () => {
      try {
        const res = await fetch(`${API_URL}/usuarios/nickname/${nick}/disponivel`);
        const data = await res.json();
        statusNick.textContent = data.disponivel ? '✅ Disponível!' : '❌ Já está em uso';
        statusNick.style.color = data.disponivel ? 'var(--verde-escuro)' : 'var(--erro)';
      } catch (_) {}
    }, 500);
  });

  // Validação de e-mail
  const inputEmail = document.getElementById('email');
  const statusEmail = document.getElementById('status-email');
  const btnSubmit = document.getElementById('btn-submit');
  let timerEmail;
  inputEmail.addEventListener('input', () => {
    clearTimeout(timerEmail);
    const email = inputEmail.value.trim();
    if (!email.includes('@') || !email.includes('.')) {
      statusEmail.textContent = ''; btnSubmit.disabled = false; return;
    }
    statusEmail.textContent = 'A verificar e-mail...';
    statusEmail.style.color = 'var(--texto-suave)';
    btnSubmit.disabled = true;
    timerEmail = setTimeout(async () => {
      try {
        const resDB = await fetch(`${API_URL}/usuarios/buscar?email=${encodeURIComponent(email)}`);
        if (resDB.ok) {
          statusEmail.textContent = '❌ Este e-mail já tem conta no VIVER+';
          statusEmail.style.color = 'var(--erro)'; return;
        }
        const API_KEY = '26522ba265584d59b8fe1046455f8fc2';
        const resMundo = await fetch(`https://emailvalidation.abstractapi.com/v1/?api_key=${API_KEY}&email=${encodeURIComponent(email)}`);
        const d = await resMundo.json();
        if (d.deliverability === 'DELIVERABLE') {
          statusEmail.textContent = '✅ E-mail válido!';
          statusEmail.style.color = 'var(--verde-escuro)';
          btnSubmit.disabled = false;
        } else if (d.deliverability === 'UNDELIVERABLE') {
          statusEmail.textContent = '❌ Este e-mail não existe.';
          statusEmail.style.color = 'var(--erro)';
        } else {
          statusEmail.textContent = '';
          btnSubmit.disabled = false;
        }
      } catch (e) {
        statusEmail.textContent = '';
        btnSubmit.disabled = false;
      }
    }, 1200);
  });

  // Envio
  document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById('msg-cadastro');
    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirmaSenha').value;
    if (senha !== confirma) {
      msgEl.textContent = 'As senhas não coincidem!';
      msgEl.style.display = 'block'; return;
    }
    const payload = {
      nome: document.getElementById('nome').value.trim(),
      nickname: document.getElementById('nickname').value.replace('@','').trim(),
      email: document.getElementById('email').value.trim(),
      dataNascimento: document.getElementById('dataNascimento').value,
      senha
    };
    try {
      const res = await fetch(`${API_URL}/cadastro`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      if (res.ok) {
        localStorage.setItem('emailRecenteCadastro', payload.email);
        window.location.href = 'index.html';
      } else {
        msgEl.textContent = await res.text();
        msgEl.style.display = 'block';
      }
    } catch (_) {
      msgEl.textContent = 'Não foi possível conectar ao servidor.';
      msgEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
