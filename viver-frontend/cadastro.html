<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVER+ - Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <main class="tela-acesso">
        <header class="marca">
            <img src="img/logo.png" alt="Logótipo Oficial do VIVER+" class="marca-icone" style="object-fit: contain;">
            <div>
                <h1>VIVER+</h1>
                <p>Rede Social de Carinho e Conexão</p>
            </div>
        </header>

        <section class="area-formulario">
            <h2>CRIAR CONTA</h2>
            <form id="form-cadastro">
                <div class="grupo-input">
                    <label for="nome">Nome Completo</label>
                    <div class="campo-com-icone">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5Z"/></svg>
                        <input type="text" id="nome" placeholder="Ex: Maria dos Santos" required>
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <div class="campo-com-icone">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-11Zm3.1-.5 5.9 5.1L17.9 6H6.1Zm12.9 2.1-6.3 5.4a1.1 1.1 0 0 1-1.4 0L5 8.1v9.4c0 .3.2.5.5.5h13c.3 0 .5-.2.5-.5V8.1Z"/></svg>
                        <input type="email" id="email" placeholder="Ex: maria.santos@email.com" required>
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="dataNascimento">Data de Nascimento</label>
                    <div class="campo-com-icone">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>
                        <input type="date" id="dataNascimento" required>
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <div class="campo-com-icone" style="margin-bottom: 10px;">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 9h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 10 0v2Zm-8 0h6V7a3 3 0 0 0-6 0v2Zm3 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
                        <input type="password" id="senha" placeholder="Crie uma senha" required minlength="3">
                    </div>
                    
                    <div class="campo-com-icone" style="margin-bottom: 10px;">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 9h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 10 0v2Zm-8 0h6V7a3 3 0 0 0-6 0v2Zm3 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
                        <input type="password" id="confirmarSenha" placeholder="Repita a sua senha" required minlength="3">
                    </div>

                    <label style="display: flex; align-items: center; gap: 8px; font-size: 1.1rem; font-weight: normal; cursor: pointer; color: var(--cor-azul);">
                        <input type="checkbox" onclick="toggleSenha()" style="width: 20px; height: 20px; cursor: pointer;"> Mostrar Senhas
                    </label>
                </div>

                <p id="mensagem-cadastro" class="mensagem" aria-live="polite"></p>
                <button type="submit" class="btn-primario btn-grande">CRIAR MINHA CONTA</button>
            </form>

            <div class="area-links">
                <p>Já tem uma conta?</p>
                <a href="index.html">Entrar</a>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/pwa-setup.js"></script>
    <script>
        function toggleSenha() {
            const senha1 = document.getElementById('senha');
            const senha2 = document.getElementById('confirmarSenha');
            const tipo = senha1.type === 'password' ? 'text' : 'password';
            senha1.type = tipo;
            senha2.type = tipo;
        }
    </script>
</body>
</html>
