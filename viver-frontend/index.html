<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVER+ - Entrar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/logo.png">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <main class="tela-acesso">
        <header class="marca">
            <img src="img/logo.png" alt="Logótipo Oficial do VIVER+" class="marca-icone" style="object-fit: contain;">
            <div>
                <h1>VIVER+</h1>
                <p>Rede Social de Carinho e Conexão</p>
            </div>
        </header>

        <section class="area-formulario">
            <h2>ENTRAR</h2>

            <form id="form-login">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <div class="campo-com-icone">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-11Zm3.1-.5 5.9 5.1L17.9 6H6.1Zm12.9 2.1-6.3 5.4a1.1 1.1 0 0 1-1.4 0L5 8.1v9.4c0 .3.2.5.5.5h13c.3 0 .5-.2.5-.5V8.1Z"/></svg>
                        <input type="email" id="email" placeholder="Ex: maria.santos@email.com" required>
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <div class="campo-com-icone" style="margin-bottom: 10px;">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 9h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 10 0v2Zm-8 0h6V7a3 3 0 0 0-6 0v2Zm3 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
                        <input type="password" id="senha" placeholder="Digite sua senha" required>
                    </div>
                    
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 1.1rem; font-weight: normal; cursor: pointer; color: var(--cor-azul);">
                        <input type="checkbox" onclick="toggleSenha()" style="width: 20px; height: 20px; cursor: pointer;"> Mostrar Senha
                    </label>
                </div>

                <button type="submit" class="btn-primario btn-grande">ENTRAR NA MINHA CONTA</button>
            </form>

            <div style="display: flex; align-items: center; margin: 24px 0;">
                <hr style="flex: 1; border: 1px solid #e9ecef;">
                <span style="margin: 0 15px; color: var(--cor-texto-suave); font-weight: bold; font-size: 1.1rem;">OU</span>
                <hr style="flex: 1; border: 1px solid #e9ecef;">
            </div>

            <div id="g_id_onload"
                 data-client_id="1095979412262-me3kh924htbgh5fmt434hqpkhjsv715s.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="pill"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 style="display: flex; justify-content: center; margin-bottom: 24px;">
            </div>

            <div class="area-links">
                <p>Ainda não tem conta?</p> <a href="cadastro.html">Criar conta</a>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/pwa-setup.js"></script> 
    <script>
        function toggleSenha() {
            const input = document.getElementById('senha');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Foco no Login: Preencher e-mail automaticamente se vier do cadastro
        window.addEventListener('load', () => {
            const emailSalvo = localStorage.getItem('emailRecenteCadastro');
            if (emailSalvo) {
                document.getElementById('email').value = emailSalvo;
                document.getElementById('senha').focus();
                localStorage.removeItem('emailRecenteCadastro');
            }
        });

        // Função de Callback chamada pela Google após o login com sucesso
        async function handleCredentialResponse(response) {
            try {
                // Envia o token da Google para o nosso servidor Javalin validar e fazer o login/cadastro
                const res = await fetch('http://localhost:8080/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                if (res.ok) {
                    const usuario = await res.json();
                    localStorage.setItem('usuarioLogado', JSON.stringify(usuario));
                    window.location.href = 'feed.html';
                } else {
                    alert('Erro ao entrar com Google: ' + await res.text());
                }
            } catch (error) {
                alert('Não foi possível conectar ao servidor VIVER+.');
            }
        }
    </script>
</body>
</html>
