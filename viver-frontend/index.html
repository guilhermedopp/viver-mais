<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIVER+ - Entrar</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <main class="tela-acesso">
        <header class="marca">
            <svg class="marca-icone" viewBox="0 0 120 120" aria-hidden="true">
                <path class="tronco" d="M58 94V60c-12 9-24 10-36 7 15-2 27-9 36-23v-9h8v23c8-9 18-15 32-17-13 8-22 18-28 31v22h28v8H24v-8h34Z"/>
                <circle class="folha" cx="31" cy="36" r="8"/>
                <circle class="folha" cx="46" cy="23" r="8"/>
                <circle class="folha" cx="64" cy="18" r="9"/>
                <circle class="folha" cx="83" cy="25" r="8"/>
                <circle class="folha" cx="96" cy="41" r="8"/>
                <circle class="folha" cx="77" cy="45" r="8"/>
                <circle class="folha" cx="48" cy="46" r="8"/>
                <path class="coracao" d="M60 51c-10-7-16-12-16-20 0-6 4-10 10-10 3 0 6 2 8 5 2-3 5-5 8-5 6 0 10 4 10 10 0 8-6 13-18 21l-2 1Z"/>
            </svg>

            <div>
                <h1>VIVER+</h1>
                <p>Rede Social de Carinho e Conexao</p>
            </div>
        </header>

        <section class="area-formulario">
            <h2>ENTRAR</h2>

            <form id="form-login">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <div class="campo-com-icone">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-11Zm3.1-.5 5.9 5.1L17.9 6H6.1Zm12.9 2.1-6.3 5.4a1.1 1.1 0 0 1-1.4 0L5 8.1v9.4c0 .3.2.5.5.5h13c.3 0 .5-.2.5-.5V8.1Z"/>
                        </svg>
                        <input type="email" id="email" placeholder="Ex: maria.santos@email.com" required>
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <div class="campo-com-icone">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M17 9h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1V7a5 5 0 0 1 10 0v2Zm-8 0h6V7a3 3 0 0 0-6 0v2Zm3 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
                        </svg>
                        <input type="password" id="senha" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-primario btn-grande">ENTRAR NA MINHA CONTA</button>
            </form>

            <div class="area-links">
                <p>Ainda nao tem conta?</p>
                <a href="cadastro.html">Criar conta</a>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
</body>
</html>
