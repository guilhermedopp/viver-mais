<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVER+ - Perfil</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
<div class="app">

  <!-- Hero verde -->
  <div class="perfil-topo" style="position:relative;">
    <button onclick="history.back()" style="position:absolute;top:16px;left:16px;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:40px;height:40px;font-size:1.4rem;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;">←</button>
    <div id="avatar-pub" class="avatar avatar-xl" style="margin:0 auto 8px;border:4px solid rgba(255,255,255,.4);"></div>
  </div>

  <!-- Card branco -->
  <div class="perfil-card" id="container-perfil">
    <div class="spinner">A carregar perfil...</div>
  </div>

  <!-- Posts do perfil -->
  <div class="page-content">
    <p class="secao-titulo">Momentos partilhados</p>
    <div id="container-posts"><div class="spinner">A carregar...</div></div>
  </div>

  <nav class="nav" aria-label="Navegação principal">
    <a href="feed.html"         class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
    <a href="chat.html"         class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><span>Chat</span></a>
    <a href="publicar.html"     class="nav-pub" aria-label="Publicar momento"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></a>
    <a href="notificacoes.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><span>Avisos</span></a>
    <a href="perfil.html"       class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Eu</span></a>
  </nav>
</div>

<script src="js/api.js"></script>
<script>
const eu = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!eu) { window.location.href = 'index.html'; throw new Error('Não autenticado'); }
const perfilId = parseInt(new URLSearchParams(window.location.search).get('id'));
if (isNaN(perfilId) || perfilId <= 0) { window.location.href = 'feed.html'; throw new Error('ID inválido'); }
if (perfilId === eu.id) { window.location.href = 'perfil.html'; throw new Error('Próprio perfil'); }

async function carregarPerfil() {
  try {
    const r = await fetch(`${API_URL}/usuarios/${perfilId}`);
    if (!r.ok) {
      document.getElementById('container-perfil').innerHTML = '<div class="empty-state"><div class="icone">😕</div><p>Não foi possível carregar este perfil.</p></div>';
      return;
    }
    const { usuario, posts, estatisticas } = await r.json();
    const sigo = await verificarSeguimento();

    // Avatar no hero
    const av = document.getElementById('avatar-pub');
    if (usuario.fotoPerfil) av.innerHTML = `<img src="${usuario.fotoPerfil}" alt="${usuario.nome}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    else av.innerHTML = `<span style="font-size:2.5rem;font-weight:800;">${usuario.nome.charAt(0).toUpperCase()}</span>`;

    document.getElementById('container-perfil').innerHTML = `
      <h1 class="perfil-nome">${usuario.nome}</h1>
      ${usuario.nickname ? `<p class="perfil-nick">@${usuario.nickname}</p>` : ''}
      <p style="font-size:.9rem;color:var(--texto-suave);font-weight:600;margin-bottom:20px;">${usuario.email}</p>
      <div class="perfil-stats">
        <div class="stat"><strong>${estatisticas.totalPosts}</strong><span>posts</span></div>
        <div class="stat"><strong>${estatisticas.totalSeguidores}</strong><span>seguidores</span></div>
        <div class="stat"><strong>${estatisticas.totalSeguindo}</strong><span>seguindo</span></div>
      </div>
      <div class="perfil-acoes">
        <button id="btn-seguir" onclick="toggleSeguir()"
          class="btn ${sigo ? 'btn-secundario' : 'btn-primario'}" style="flex:1;">
          ${sigo ? '✅ Seguindo' : '➕ Seguir'}
        </button>
        <button onclick="window.location.href='chat.html?usuario=${perfilId}'"
          class="btn btn-secundario" style="flex:1;">
          💬 Mensagem
        </button>
      </div>`;

    const c = document.getElementById('container-posts');
    if (!posts?.length) {
      c.innerHTML = '<div class="empty-state"><div class="icone">📝</div><p>Ainda não partilhou momentos.</p></div>';
      return;
    }
    c.innerHTML = posts.map(p => `
      <article class="post-card" style="margin-bottom:12px;">
        <p class="post-data" style="padding:14px 16px 0;">${new Date(p.data).toLocaleDateString('pt-PT',{day:'2-digit',month:'short'})}</p>
        <p class="post-corpo">${p.conteudo}</p>
        ${p.imagem ? `<img src="${p.imagem}" class="post-imagem" style="border-radius:0 0 16px 16px;">` : ''}
      </article>`).join('');
  } catch (_) {
    document.getElementById('container-perfil').innerHTML = '<p style="color:var(--erro);padding:20px;">Erro ao carregar perfil.</p>';
  }
}

async function verificarSeguimento() {
  try {
    const r = await fetch(`${API_URL}/usuarios/${perfilId}/sigo?usuarioId=${eu.id}`);
    if (r.ok) return (await r.json()).sigo;
  } catch (_) {}
  return false;
}

async function toggleSeguir() {
  const btn = document.getElementById('btn-seguir');
  try {
    const r = await fetch(`${API_URL}/usuarios/${perfilId}/seguir`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({usuarioId: eu.id})
    });
    if (r.ok) {
      const res = await r.text();
      btn.textContent = res === 'seguiu' ? '✅ Seguindo' : '➕ Seguir';
      btn.className   = `btn ${res === 'seguiu' ? 'btn-secundario' : 'btn-primario'}`;
    }
  } catch (_) {}
}

if (perfilId !== eu.id) carregarPerfil();
</script>
<script src="js/pwa-setup.js"></script>
</body>
</html>
