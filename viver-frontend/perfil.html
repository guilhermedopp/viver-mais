<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVER+ - O Meu Perfil</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>

    <main class="tela-acesso" style="max-width: 650px; padding-bottom: 90px; justify-content: flex-start;">
        
        <header style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 30px; padding-top: 20px;">
            
            <input type="file" id="input-foto" accept="image/*" style="display: none;">
            
            <div id="avatar-perfil" onclick="document.getElementById('input-foto').click()" style="width: 120px; height: 120px; background: var(--cor-primaria); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(27, 184, 47, 0.3); cursor: pointer; overflow: hidden; position: relative; border: 4px solid var(--cor-fundo);">
                <span id="letra-avatar">?</span>
            </div>
            <p style="font-size: 0.9rem; color: var(--cor-texto-suave); margin-bottom: 15px; cursor: pointer;" onclick="document.getElementById('input-foto').click()">Tocar para alterar foto</p>

            <h1 id="nome-perfil" style="font-size: 2.2rem; color: var(--cor-azul); margin-bottom: 5px;">Carregando...</h1>
            <p id="email-perfil" style="font-size: 1.2rem; color: var(--cor-texto-suave); margin-bottom: 20px;">...</p>
            
            <div style="display: flex; gap: 25px; margin-bottom: 20px;">
                <div style="text-align: center;"><strong id="num-posts" style="display: block; font-size: 1.4rem;">0</strong> posts</div>
                <div style="text-align: center;"><strong id="num-seguidores" style="display: block; font-size: 1.4rem;">0</strong> seguidores</div>
                <div style="text-align: center;"><strong id="num-seguindo" style="display: block; font-size: 1.4rem;">0</strong> seguindo</div>
            </div>
            
            <button id="btn-sair-perfil" class="btn-primario" style="padding: 10px 30px; border-radius: 99px; background: #eefaf0; color: var(--cor-erro); border: 2px solid var(--cor-erro); font-weight: bold;">Terminar Sessão</button>
        </header>

        <div style="width: 100%; height: 3px; background: var(--cor-borda); margin-bottom: 25px; border-radius: 2px;"></div>

        <section>
            <h2 style="font-size: 1.6rem; text-align: left; margin-bottom: 15px; color: var(--cor-azul);">As minhas memórias</h2>
            <div id="container-meus-posts">
                <p style="font-size: 1.2rem; color: var(--cor-texto-suave);">A procurar os seus momentos...</p>
            </div>
        </section>

        <nav class="barra-navegacao">
            <a href="feed.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
            <a href="#" class="item-nav" onclick="alert('Página de Mensagens em construção!')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><span>Chat</span></a>
            <a href="publicar.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><span>Publicar</span></a>
            <a href="comunidades.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span>Grupos</span></a>
            <a href="notificacoes.html" class="item-nav"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><span>Avisos</span></a>
            <a href="perfil.html" class="item-nav ativo"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></a>
        </nav>
    </main>

    <script>
        const API_URL = 'http://localhost:8080/api';
        let usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));

        if (!usuarioLogado) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('nome-perfil').textContent = usuarioLogado.nome;
            document.getElementById('email-perfil').textContent = usuarioLogado.email;
            
            if (usuarioLogado.fotoPerfil) {
                document.getElementById('avatar-perfil').innerHTML = `<img src="${usuarioLogado.fotoPerfil}" style="width: 100%; height: 100%; object-fit: cover;">`;
            } else {
                document.getElementById('letra-avatar').textContent = usuarioLogado.nome.charAt(0).toUpperCase();
            }
            
            carregarEstatisticas();
            carregarMeusPosts();
        }

        async function carregarEstatisticas() {
            try {
                const r = await fetch(`${API_URL}/usuarios/${usuarioLogado.id}/estatisticas`);
                if (r.ok) {
                    const stats = await r.json();
                    document.getElementById('num-posts').textContent = stats.totalPosts;
                    document.getElementById('num-seguidores').textContent = stats.totalSeguidores;
                    document.getElementById('num-seguindo').textContent = stats.totalSeguindo;
                }
            } catch (e) { console.error("Erro ao carregar stats:", e); }
        }

        // ... (resto da sua lógica de upload de foto e carregamento de posts) ...
        document.getElementById('input-foto').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result;
                document.getElementById('avatar-perfil').innerHTML = `<img src="${base64}" style="width: 100%; height: 100%; object-fit: cover;">`;
                await fetch(`${API_URL}/usuarios/${usuarioLogado.id}/foto`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({base64})
                });
                usuarioLogado.fotoPerfil = base64;
                localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogado));
            };
            reader.readAsDataURL(file);
        });

        async function carregarMeusPosts() {
            const r = await fetch(`${API_URL}/posts?usuarioId=${usuarioLogado.id}`);
            if (r.ok) {
                const posts = await r.json();
                const meus = posts.filter(p => p.autor.id === usuarioLogado.id);
                const container = document.getElementById('container-meus-posts');
                container.innerHTML = meus.map(p => `
                    <article style="background: white; border: 3px solid #e9ecef; border-radius: 14px; padding: 20px; margin-bottom: 15px;">
                        <p style="font-size: 1.3rem;">${p.conteudo}</p>
                    </article>
                `).join('');
            }
        }
    </script>
</body>
</html>
