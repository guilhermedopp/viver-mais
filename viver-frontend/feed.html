<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVER+ - Feed</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
<div class="app">

  <!-- Header fixo -->
  <header class="page-header">
    <div class="logo-mini">
      <img src="img/logo.png" alt="VIVER+">
      <span>VIVER+</span>
    </div>
    <div style="flex:1;"></div>
    <p id="saudacao" style="font-size:.9rem;font-weight:700;color:var(--texto-suave);"></p>
    <button onclick="alternarAcessibilidade()" class="btn-icone" title="Alternar tamanho da letra" style="margin-left:8px;">
      <svg viewBox="0 0 24 24"><path d="M9 4v3h5v12h3V7h5V4H9zm-6 8h3v7h3v-7h3V9H3v3z"/></svg>
    </button>
  </header>

  <!-- Pesquisa -->
  <div class="pesquisa-section">
    <div class="pesquisa-container">
      <svg class="pesquisa-icone" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="search" class="pesquisa-input" id="pesquisa-input"
             placeholder="Pesquisar pessoa pelo nome ou @apelido"
             autocomplete="off" oninput="pesquisarUsuarios()">
      <div class="pesquisa-resultados" id="pesquisa-resultados" style="display:none;"></div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="filtros">
    <button class="filtro ativo" id="btn-todos"     onclick="filtrar('todos')">Todos</button>
    <button class="filtro"       id="btn-seguindo"  onclick="filtrar('seguindo')">👥 Seguindo</button>
    <button class="filtro"       id="btn-novos"     onclick="filtrar('novos')">🆕 Novos</button>
    <button class="filtro"       id="btn-ja-vistos" onclick="filtrar('vistos')">✅ Já vistos</button>
  </div>

  <!-- Feed de posts -->
  <div class="feed" id="container-posts">
    <div class="spinner">A carregar os momentos...</div>
  </div>

  <!-- Barra de navegação inferior -->
  <nav class="nav" aria-label="Navegação principal">
    <a href="feed.html"          class="nav-item ativo"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Início</span></a>
    <a href="chat.html"           class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><span>Chat</span></a>
    <a href="publicar.html"      class="nav-pub" aria-label="Publicar momento"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></a>
    <a href="notificacoes.html"  class="nav-item nav-item-wrap">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span id="badge-notif" class="nav-badge" style="display:none;">0</span>
      <span>Avisos</span>
    </a>
    <a href="perfil.html"        class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Perfil</span></a>
  </nav>

</div>

<script src="js/api.js"></script>
<script>
const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
if (!usuario) {
  window.location.href = 'index.html';
  throw new Error('Não autenticado');
}
document.getElementById('saudacao').textContent = `Olá, ${usuario.nome.split(' ')[0]}! 👋`;

let todosPosts = [], filtroAtual = 'todos';

function navegarPerfil(id) {
  if (id === usuario.id) window.location.href = 'perfil.html';
  else window.location.href = `perfil-publico.html?id=${id}`;
}

// ── Pesquisa de utilizadores ──────────────────────────────
let todosUsuarios = null, timerPesquisa;

async function carregarTodosUsuarios() {
  if (todosUsuarios) return todosUsuarios;
  try {
    const r = await fetch(`${API_URL}/usuarios`);
    if (r.ok) todosUsuarios = await r.json();
  } catch (_) {}
  return todosUsuarios || [];
}

async function pesquisarUsuarios() {
  clearTimeout(timerPesquisa);
  const q = document.getElementById('pesquisa-input').value.trim().toLowerCase();
  const box = document.getElementById('pesquisa-resultados');
  if (q.length < 2) { box.style.display = 'none'; return; }
  timerPesquisa = setTimeout(async () => {
    const lista = await carregarTodosUsuarios();
    const filtrados = lista.filter(u =>
      u.id !== usuario.id && (
        u.nome.toLowerCase().includes(q) ||
        (u.nickname && u.nickname.toLowerCase().includes(q.replace('@', '')))
      )
    ).slice(0, 7);
    if (!filtrados.length) {
      box.innerHTML = '<div class="pesquisa-vazio">Nenhuma pessoa encontrada</div>';
    } else {
      box.innerHTML = filtrados.map(u => {
        const av = u.fotoPerfil
          ? `<img src="${u.fotoPerfil}" class="avatar avatar-sm" alt="${u.nome}">`
          : `<div class="avatar avatar-sm">${u.nome.charAt(0).toUpperCase()}</div>`;
        return `<div class="pesquisa-item" onclick="irParaPerfil(${u.id})">
          ${av}
          <div><strong>${u.nome}</strong>${u.nickname ? `<small>@${u.nickname}</small>` : ''}</div>
        </div>`;
      }).join('');
    }
    box.style.display = 'block';
  }, 280);
}

function irParaPerfil(id) {
  document.getElementById('pesquisa-resultados').style.display = 'none';
  document.getElementById('pesquisa-input').value = '';
  navegarPerfil(id);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.pesquisa-container'))
    document.getElementById('pesquisa-resultados').style.display = 'none';
});

async function carregarBadgeNotif() {
  try {
    const r = await fetch(`${API_URL}/notificacoes/${usuario.id}/nao-lidas`);
    if (r.ok) {
      const { total } = await r.json();
      const b = document.getElementById('badge-notif');
      b.style.display = total > 0 ? 'flex' : 'none';
      b.textContent = total;
    }
  } catch (_) {}
}

function filtrar(tipo) {
  filtroAtual = tipo;
  document.querySelectorAll('.filtro').forEach(b => b.classList.remove('ativo'));
  const map = { todos:'btn-todos', seguindo:'btn-seguindo', novos:'btn-novos', vistos:'btn-ja-vistos' };
  document.getElementById(map[tipo])?.classList.add('ativo');
  if (tipo === 'seguindo' || tipo === 'todos') carregarFeed();
  else renderizarPosts();
}

function avatar(u, size='md') {
  const s = size === 'sm' ? 'avatar-sm' : 'avatar-md';
  if (u.fotoPerfil) return `<img src="${u.fotoPerfil}" class="avatar ${s}" alt="${u.nome}">`;
  return `<div class="avatar ${s}">${u.nome.charAt(0).toUpperCase()}</div>`;
}

function renderizarPosts() {
  const c = document.getElementById('container-posts');
  let posts = todosPosts;
  if (filtroAtual === 'novos')  posts = todosPosts.filter(p => !p.visto);
  if (filtroAtual === 'vistos') posts = todosPosts.filter(p =>  p.visto);

  if (!posts.length) {
    const msgs = { novos:'Nenhum momento novo! Você está em dia ✅', vistos:'Ainda não viu nenhum momento.', seguindo:'Quem segue ainda não partilhou momentos.' };
    c.innerHTML = `<div style="padding:48px 24px;text-align:center;"><div style="font-size:3rem;margin-bottom:16px;">🌿</div><p style="font-size:1.1rem;font-weight:600;color:var(--texto-suave);">${msgs[filtroAtual] || 'Ainda não há momentos. Seja o primeiro!'}</p></div>`;
    return;
  }
  c.innerHTML = '';
  posts.forEach(p => c.appendChild(renderCard(p)));
}

function renderCard(post) {
  const data = new Date(post.data).toLocaleDateString('pt-PT', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const n = post.totalCurtidas || 0;
  const nc = post.respostas ? post.respostas.length : 0;

  let respostasHtml = '';
  if (post.respostas?.length) {
    respostasHtml = `<div class="respostas">${post.respostas.map(r => `
      <div class="resposta">
        <a href="perfil-publico.html?id=${r.autor.id}" onclick="navegarPerfil(${r.autor.id});return false;" style="display:flex;flex-shrink:0;">${avatar(r.autor,'sm')}</a>
        <div class="resposta-balao">
          <a href="perfil-publico.html?id=${r.autor.id}" onclick="navegarPerfil(${r.autor.id});return false;" class="resposta-autor">${r.autor.nome}</a>
          <p class="resposta-texto">${r.conteudo}</p>
        </div>
      </div>`).join('')}</div>`;
  }

  const art = document.createElement('article');
  art.className = `post-card${!post.visto ? ' novo' : ''}`;
  art.innerHTML = `
    <div class="post-card-header">
      <a href="perfil-publico.html?id=${post.autor.id}" onclick="navegarPerfil(${post.autor.id});return false;" style="text-decoration:none;display:flex;flex-shrink:0;">${avatar(post.autor)}</a>
      <div class="info">
        <a href="perfil-publico.html?id=${post.autor.id}" onclick="navegarPerfil(${post.autor.id});return false;" class="post-autor">${post.autor.nome}</a>
        <p class="post-data">${data}${!post.visto ? ' <span class="post-tag-novo">Novo</span>' : ''}</p>
      </div>
    </div>
    <p class="post-corpo">${post.conteudo}</p>
    ${post.imagem ? `<img src="${post.imagem}" class="post-imagem" alt="Imagem do post">` : ''}
    <div class="post-acoes">
      <button class="btn-reacao" onclick="reagirPost(${post.id},'curtida')" title="Curtir">❤️</button>
      <button class="btn-reacao" onclick="reagirPost(${post.id},'abraco')"  title="Abraço">🫂</button>
      <button class="btn-reacao" onclick="reagirPost(${post.id},'parabens')" title="Parabéns">👏</button>
      <span class="reacao-count">${n}</span>
      <button class="btn-comentar" onclick="abrirResposta(${post.id})">💬 ${nc}</button>
    </div>
    ${respostasHtml}
    <div class="area-comentar" id="area-resp-${post.id}">
      <textarea id="txt-resp-${post.id}" placeholder="Escreva uma palavra de carinho..."></textarea>
      <button onclick="enviarResposta(${post.id})" class="btn btn-primario" style="margin-top:8px;padding:12px;">Publicar Comentário</button>
    </div>`;
  return art;
}

async function reagirPost(postId, tipo) {
  try {
    await fetch(`${API_URL}/posts/${postId}/reagir`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({usuarioId: usuario.id, tipo})
    });
    carregarFeed();
  } catch (_) {}
}

function abrirResposta(postId) {
  const el = document.getElementById(`area-resp-${postId}`);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
  if (el.style.display === 'block') document.getElementById(`txt-resp-${postId}`).focus();
}

async function enviarResposta(postId) {
  const txt = document.getElementById(`txt-resp-${postId}`).value.trim();
  if (!txt) return;
  try {
    const r = await fetch(`${API_URL}/posts/${postId}/responder`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({usuarioId: usuario.id, texto: txt})
    });
    if (r.ok) carregarFeed();
    else mostrarToast(await r.text(), 'erro');
  } catch (_) {}
}

async function marcarVistos(posts) {
  for (const p of posts.filter(x => !x.visto)) {
    try {
      await fetch(`${API_URL}/posts/${p.id}/ver`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({usuarioId: usuario.id})
      });
    } catch (_) {}
  }
}

async function carregarFeed() {
  try {
    let url = `${API_URL}/posts?usuarioId=${usuario.id}`;
    if (filtroAtual === 'seguindo') url += '&filtro=seguindo';
    const r = await fetch(url);
    if (r.ok) {
      todosPosts = await r.json();
      renderizarPosts();
      setTimeout(() => marcarVistos(todosPosts.filter(p => !p.visto)), 2000);
    } else if (r.status === 401) {
      localStorage.removeItem('jwtToken');
      localStorage.removeItem('usuarioLogado');
      window.location.href = 'index.html';
    } else {
      document.getElementById('container-posts').innerHTML = '<div style="padding:40px;text-align:center;color:var(--erro);">Erro ao carregar os momentos. Verifique o servidor.</div>';
    }
  } catch (_) {
    document.getElementById('container-posts').innerHTML = '<div style="padding:40px;text-align:center;color:var(--erro);">Erro ao carregar. Verifique o servidor.</div>';
  }
}

// WebSocket para notificações em tempo real
try {
  const wsHost = API_URL.replace(/^https?/, 'ws').replace('/api', '');
  const ws = new WebSocket(`${wsHost}/ws/notificacoes/${usuario.id}`);
  ws.onmessage = (e) => {
    if (e.data === 'NOVA_NOTIFICACAO') {
      const b = document.getElementById('badge-notif');
      b.style.display = 'flex';
      b.textContent = parseInt(b.textContent || 0) + 1;
    }
  };
} catch (_) {}

carregarFeed();
carregarBadgeNotif();
</script>
<script src="js/pwa-setup.js"></script>
</body>
</html>
