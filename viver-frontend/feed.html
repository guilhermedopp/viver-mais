<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVER+ - Feed de Momentos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>

    <main class="tela-acesso" style="max-width: 650px; padding-bottom: 90px;">
        
        <header class="cabecalho-simples" style="justify-content: space-between; margin-bottom: 20px; align-items: center; display: flex;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="img/logo.png" alt="Logótipo Oficial do VIVER+" style="height: 55px; width: auto; object-fit: contain;">
                <div>
                    <h1 style="margin: 0; font-size: 1.8rem;">VIVER+</h1>
                    <p id="saudacao" style="margin: 0; margin-top: 2px;">Olá, ...</p>
                </div>
            </div>
        </header>

        <section>
            <h2 style="font-size: 1.8rem; text-align: left; margin-bottom: 15px;">Momentos da nossa Rede</h2>
            <div id="container-posts">
                <p style="font-size: 1.2rem; color: var(--cor-texto-suave);">A carregar os momentos...</p>
            </div>
        </section>

        <nav class="barra-navegacao">
            <a href="feed.html" class="item-nav ativo">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Início</span>
            </a>
            
            <a href="#" class="item-nav" onclick="alert('Página de Mensagens em construção!')">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                <span>Chat</span>
            </a>

            <a href="publicar.html" class="item-nav">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span>Publicar</span>
            </a>

            <a href="perfil.html" class="item-nav">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>Perfil</span>
            </a>
        </nav>

    </main>

    <script>
        const API_URL = 'http://localhost:8080/api';
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));

        // Proteção: Se não estiver logado, volta para o login
        if (!usuarioLogado) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('saudacao').textContent = `Olá, ${usuarioLogado.nome}! 👋`;
        }

        // Função para carregar os posts vindos da API Java
        async function carregarPosts() {
            try {
                const resposta = await fetch(`${API_URL}/posts`);
                if (resposta.ok) {
                    const posts = await resposta.json();
                    const container = document.getElementById('container-posts');
                    container.innerHTML = '';

                    if (posts.length === 0) {
                        container.innerHTML = '<p style="font-size: 1.2rem;">Ainda não há partilhas. Seja o primeiro!</p>';
                        return;
                    }

                    posts.forEach(post => {
                        const dataFormatada = new Date(post.data).toLocaleDateString('pt-PT', {
                            hour: '2-digit', minute: '2-digit'
                        });

                        const card = document.createElement('article');
                        card.style.background = '#ffffff';
                        card.style.border = '3px solid #e9ecef';
                        card.style.borderRadius = '14px';
                        card.style.padding = '20px';
                        card.style.marginBottom = '15px';
                        card.style.textAlign = 'left';

                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <strong style="font-size: 1.25rem; color: var(--cor-azul, #0f5d82);">${post.autor.nome}</strong>
                                <span style="font-size: 0.95rem; color: gray;">${dataFormatada}</span>
                            </div>
                            <p style="font-size: 1.3rem; line-height: 1.4; font-weight: 500; color: #111;">${post.conteudo}</p>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (erro) {
                console.error("Erro ao ir buscar posts:", erro);
            }
        }

        // Carrega as publicações assim que abre a página
        carregarPosts();
    </script>

    <script src="js/pwa-setup.js"></script>
</body>
</html>
